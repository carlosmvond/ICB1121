<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Super Claude Bros</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; }
#wrapper { width: 100%; max-width: 520px; }
#ui { display: flex; justify-content: space-between; align-items: center; padding: 6px 12px; background: #000; color: #fff; font-size: 12px; gap: 4px; }
#ui span { flex: 1; text-align: center; }
#gameWrap { position: relative; width: 100%; overflow: hidden; background: #c8e8c8; }
canvas { display: block; width: 100%; image-rendering: pixelated; }
#valve-panel { background: #1a1a1a; padding: 8px 14px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
#valve-panel label { color: #aaa; font-size: 11px; white-space: nowrap; }
#valve-panel input[type=range] { flex: 1; min-width: 80px; }
#valve-panel span { color: #fff; font-size: 12px; min-width: 32px; text-align: right; }
#valveBtn { background: #c44; border: none; color: #fff; font-family: monospace; font-size: 12px; padding: 7px 12px; border-radius: 5px; cursor: pointer; white-space: nowrap; }
#valveBtn:disabled { background: #555; cursor: not-allowed; }
#controls { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; background: #111; }
.btn { background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; color: #fff; font-size: 20px; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
.btn:active { background: rgba(255,255,255,0.35); }
#dpad { display: flex; gap: 4px; }
#jumpBtn { background: rgba(255,80,80,0.35); border-color: rgba(255,80,80,0.6); font-size: 24px; width: 64px; height: 64px; }
#overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.72); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; font-family: monospace; text-align: center; padding: 20px; }
#overlay h2 { font-size: 18px; margin-bottom: 8px; }
#overlay p { font-size: 12px; color: #ccc; margin-bottom: 14px; line-height: 1.8; }
#overlay button { background: #2a8; border: none; color: #fff; font-family: monospace; font-size: 14px; padding: 9px 24px; border-radius: 6px; cursor: pointer; }
</style>
</head>
<body>
<div id="wrapper">
  <div id="ui">
    <span>VIDAS: <span id="livesEl">3</span></span>
    <span id="statusEl">Abre la válvula</span>
    <span>EL PEZ VENENOSO</span>
  </div>
  <div id="gameWrap">
    <canvas id="c"></canvas>
    <div id="overlay">
      <h2>Nivel 1 — El Pez Venenoso</h2>
      <button id="startBtn">JUGAR</button>
    </div>
  </div>
  <div id="valve-panel">
    <label>Válvula — tiempo:</label>
    <input type="range" id="valveSlider" min="1" max="60" value="20" step="1">
    <span id="valveTimeLabel">20s</span>
    <button id="valveBtn">Abrir válvula</button>
  </div>
  <div id="controls">
    <div id="dpad">
      <div class="btn" id="leftBtn">&#8592;</div>
      <div class="btn" id="rightBtn">&#8594;</div>
    </div>
    <div class="btn" id="jumpBtn">&#8679;</div>
    <div class="btn" id="attackBtn" style="background:rgba(255,180,0,0.35);border-color:rgba(255,180,0,0.7);font-size:18px;">&#9876;</div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 460, H = 280;
canvas.width = W; canvas.height = H;

const PLAT_L_Y  = 160;
const PLAT_R_Y  = 40;
const PIT_L     = 130;
const PIT_R     = 310;
const PIT_BOT   = 260;
const WALL_W    = 12;
const FLOW_RATE = 5;

const BEAR_X   = 68;
const DOOR_W   = 22;
const DOOR_H   = 36;
const FLAG_X   = W - WALL_W - DOOR_W - 10;
const FLAG_Y   = PLAT_R_Y - DOOR_H;

const PIT_VOLUME = PIT_BOT - 55;
const WATER_START = PIT_BOT - 40;

let lives = 3, gameRunning = false;
let keys = { left:false, right:false, jump:false, attack:false };
let jumpPressed = false, attackPressed = false;
let player, state;

function initGame() {
  player = {
    x: WALL_W + 8, y:PLAT_L_Y-20,
    w:14, h:18,
    vx:0, vy:0,
    onGround:false,
    dead:false, deathTimer:0,
    invincible:0,
    facing:1, swimming:false
  };
  state = {
    waterLevel: WATER_START,
    valveUsed:false, valveActive:false, valveTimer:0,
    fishAlive:true, fishCaught:false,
    fishX:210, fishY:0, fishDir:1, fishAnim:0,
    spear:null,
    particles:[],
    waterDrops:[],
    outcome:null, outcomeTimer:0
  };
  document.getElementById('valveBtn').disabled = false;
  document.getElementById('valveSlider').disabled = false;
  setStatus('Abre la válvula para subir el agua');
}

function setStatus(t) { document.getElementById('statusEl').textContent = t; }
function updateUI()   { document.getElementById('livesEl').textContent = lives; }

const LADDER_X   = PIT_R - 18;
const LADDER_TOP = PLAT_R_Y - 16;
const LADDER_BOT = PLAT_L_Y + 22;
const LADDER_W   = 14;

function onLadder(p) {
  return p.x+p.w > LADDER_X && p.x < LADDER_X+LADDER_W &&
         p.y+p.h > LADDER_TOP && p.y < LADDER_BOT;
}

function onLadderEntry(p) {
  // Can grab ladder from water even if slightly outside normal bounds
  return p.x+p.w > LADDER_X-2 && p.x < LADDER_X+LADDER_W+2 &&
         p.y+p.h > LADDER_TOP && p.y < LADDER_BOT + 10;
}

function platforms() {
  return [
    {x:0,        y:PLAT_L_Y, w:PIT_L,        h:H-PLAT_L_Y},
    {x:PIT_R,    y:PLAT_R_Y, w:W-PIT_R,      h:H-PLAT_R_Y},
    {x:PIT_L,    y:PIT_BOT,  w:PIT_R-PIT_L,  h:H-PIT_BOT },
    {x:0,        y:0,        w:WALL_W,        h:H          },
    {x:W-WALL_W, y:0,        w:WALL_W,        h:H          },
  ];
}

function overlap(a,b) {
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

function update(dt) {
  if (!gameRunning) return;
  const p = player, s = state;

  if (p.dead) {
    p.deathTimer -= dt;
    if (p.deathTimer <= 0) {
      lives--; updateUI();
      if (lives <= 0) { showOverlay('GAME OVER','Sin más vidas.','REINICIAR',true); gameRunning=false; return; }
      initGame();
    }
    return;
  }

  if (s.outcome) {
    s.outcomeTimer -= dt;
    if (s.outcomeTimer <= 0) {
      if (s.outcome==='win') {
        showOverlay('¡NIVEL COMPLETADO!','¡Mataste al pez venenoso!\n¡Bien calculado!','JUGAR DE NUEVO',true);
        gameRunning=false;
      } else {
        p.dead=true; p.deathTimer=1.0;
      }
      s.outcome=null;
    }
    return;
  }

  if (s.valveActive) {
    s.valveTimer -= dt * 3;
    s.waterLevel = Math.max(s.waterLevel - FLOW_RATE*dt, 55);
    if (s.valveTimer<=0 || s.waterLevel<=55) { s.valveActive=false; }
    // Spawn water stream from pipe high on left wall of pit
    const numDrops = Math.floor(2 + Math.random()*3);
    for (let i = 0; i < numDrops; i++) {
      s.waterDrops.push({
        x: PIT_L + 2 + Math.random()*3,
        y: PLAT_R_Y + 10 + Math.random()*10,
        vx: 1.5 + Math.random()*2,
        vy: -1 + Math.random()*2,
        life: 1
      });
    }
    const pct = Math.round((PIT_BOT - s.waterLevel) / PIT_VOLUME * 100);
    setStatus('Llenando... ' + Math.max(0,s.valveTimer).toFixed(1)+'s  |  ' + pct + '%');
  } else if (s.valveUsed && !s.fishCaught && !s.fishEscaped) {
    const pct = Math.round((PIT_BOT - s.waterLevel) / PIT_VOLUME * 100);
    setStatus('Volumen: ' + pct + '%');
  }

  const wY = s.waterLevel;

  const waterDepthOnPlat = wY < PLAT_L_Y ? (PLAT_L_Y - wY) : 0;
  const playerMidSubmerged = waterDepthOnPlat >= p.h / 2;
  const canUseSpear = waterDepthOnPlat > 0 && waterDepthOnPlat < p.h / 2;

  // Spear thrust: animate extension and retraction
  if (s.spear) {
    s.spear.timer -= dt;
    const progress = 1 - s.spear.timer / s.spear.duration;
    // Extend for first half, retract for second half
    s.spear.reach = Math.sin(progress * Math.PI) * s.spear.maxReach;

    // Hit detection: tip position
    const tipX = p.x + p.w/2 + Math.cos(s.spear.angle) * s.spear.reach;
    const tipY = p.y + p.h/2 + Math.sin(s.spear.angle) * s.spear.reach;
    // Update water drops
  s.waterDrops = s.waterDrops.filter(d => {
    d.x += d.vx * dt * 60;
    d.y += d.vy * dt * 60;
    d.vy += 0.5;
    if (d.vy > 12) d.vy = 12;
    d.life -= dt * 0.8;
    if (d.y > s.waterLevel) { // splash
      // spawn splash particles
      d.life = 0;
    }
    if (d.x > PIT_R - 4) { d.vx *= -0.5; d.x = PIT_R - 4; }
    return d.life > 0 && d.y < s.waterLevel + 2;
  });

  if (s.fishAlive) {
      const fd = {x:s.fishX-14, y:s.fishY-10, w:28, h:20};
      const tip = {x:tipX-4, y:tipY-4, w:8, h:8};
      if (overlap(tip, fd)) {
        s.fishAlive = false; s.fishCaught = true;
        setStatus('¡Pescado! Sube por la escalera y llega a la puerta.');
        for (let i=0;i<14;i++) s.particles.push({
          x:s.fishX, y:s.fishY,
          vx:(Math.random()-0.5)*5, vy:-Math.random()*4-1, life:0.9
        });
        s.spear = null;
      }
    }
    if (s.spear && s.spear.timer <= 0) s.spear = null;
  }

  // Start spear thrust: only when walking (not swimming, not climbing)
  if (keys.attack && !attackPressed && !p.swimming && !p.climbing && !s.spear) {
    attackPressed = true;
    // Angle: diagonal downward in facing direction
    const angle = p.facing === 1 ? Math.PI * 0.2 : Math.PI * 0.8;
    const duration = 0.35;
    s.spear = {
      angle,
      reach: 0,
      maxReach: 38,
      timer: duration,
      duration
    };
  }
  if (!keys.attack) attackPressed = false;

  if (s.fishAlive) {
    const waterOver = wY < PLAT_L_Y;
    const waterBot  = PIT_BOT;
    // Fish target Y: near surface when player not forced to swim, mid-depth when flooded
    const playerForcedSwim = wY < p.y + p.h/2;
    const waterMid = playerForcedSwim ? wY + (waterBot - wY) * 0.55 : wY + 6;

    // Fish X limits: the left platform (café wall) is solid up to PLAT_L_Y.
    // The fish can only cross left of PIT_L if it is swimming ABOVE the platform surface,
    // i.e. its Y position is above PLAT_L_Y (water has flooded over the top of the wall).
    const fishCanCrossLeft = s.fishY < PLAT_L_Y;
    const fishMinX = fishCanCrossLeft ? WALL_W+4 : PIT_L+12;
    const fishMaxX = PIT_R-18;

    if (p.swimming) {
      const dxFish = (p.x + p.w/2) - s.fishX;
      const dyFish = (p.y + p.h/2) - s.fishY;
      const dist = Math.sqrt(dxFish*dxFish + dyFish*dyFish) || 1;
      const speed = 140;
      s.fishDir = dxFish > 0 ? 1 : -1;
      s.fishX += (dxFish/dist) * speed * dt;
      s.fishY += (dyFish/dist) * speed * dt;
      s.fishX = Math.max(fishMinX, Math.min(fishMaxX, s.fishX));
      s.fishY = Math.max(wY+4, Math.min(waterBot-8, s.fishY));
    } else if (waterOver) {
      // Always patrol, flip at walls
      s.fishX += s.fishDir * 100 * dt;
      if (s.fishX < fishMinX) { s.fishX = fishMinX; s.fishDir = 1; }
      if (s.fishX > fishMaxX) { s.fishX = fishMaxX; s.fishDir = -1; }
      s.fishY += (waterMid - s.fishY) * 3 * dt;
    } else {
      s.fishX += s.fishDir * 100 * dt;
      if (s.fishX < PIT_L+12) { s.fishX=PIT_L+12; s.fishDir=1; }
      if (s.fishX > PIT_R-22) { s.fishX=PIT_R-22; s.fishDir=-1; }
      s.fishY += (waterMid - s.fishY) * 3 * dt;
    }
    s.fishY = Math.max(wY+4, Math.min(waterBot-8, s.fishY));
    s.fishAnim += dt*6;

    if (p.invincible<=0) {
      const fd = {x:s.fishX-12, y:s.fishY-8, w:24, h:16};
      if (overlap({x:p.x,y:p.y,w:p.w,h:p.h}, fd)) {
        if (!s.outcome) { s.outcome='die'; s.outcomeTimer=0.5; setStatus('¡El pez te comió!'); }
      }
    }
  }

  if (!s.valveActive && s.valveUsed && !s.fishCaught) {
    if (playerMidSubmerged) setStatus('Nadando — ¡cuidado con el pez!');
    else setStatus('Volumen: ' + Math.round((PIT_BOT - wY) / PIT_VOLUME * 100) + '%  |  Usa ⚔ para lanzar');
  }

  s.particles = s.particles.filter(sp => {
    sp.x+=sp.vx; sp.y+=sp.vy; sp.vy+=0.18; sp.life-=dt;
    return sp.life>0;
  });

  if (s.fishCaught) {
    if (p.x+p.w > FLAG_X && p.x < FLAG_X+DOOR_W && p.y+p.h > FLAG_Y && p.y < FLAG_Y+DOOR_H) {
      if (!s.outcome) { s.outcome='win'; s.outcomeTimer=0.4; }
      return;
    }
  }

  if (p.invincible>0) p.invincible-=dt;
  const spd=1.9;
  if (keys.left)       { p.vx=-spd; p.facing=-1; }
  else if (keys.right) { p.vx= spd; p.facing= 1; }
  else p.vx*=0.72;

  const inPitX = p.x+p.w>PIT_L && p.x<PIT_R;
  const inWaterPit = inPitX && p.y+p.h > wY;
  const onLeftPlat = !inPitX && p.x < PIT_L;
  // Flooded left: water covers at least half the player's body
  const floodOnLeft = wY < PLAT_L_Y && wY < p.y + p.h/2;
  const climbing = onLadderEntry(p);
  // Only swimming in the pit — on left platform, player walks normally but shows swim sprite
  const swimming = inWaterPit && !climbing;
  p.swimming = swimming || (onLeftPlat && floodOnLeft); // sprite only
  p.climbing = climbing;

  if (swimming) {
    // In the pit: buoyancy physics
    p.vy += 0.12; if (p.vy > 1.5) p.vy = 1.5;
    if (keys.jump) p.vy = -1.5;
  } else if (climbing) {
    p.vy = 0; p.vx = 0;
    if (keys.jump) p.vy = -2.0;
    if (keys.left)  { p.vx=-1.9; p.facing=-1; }
    if (keys.right) { p.vx= 1.9; p.facing= 1; }
    p.onGround = false;
  } else {
    // Normal gravity — works on left platform even if flooded
    p.vy += 0.32; if (p.vy>9) p.vy=9;
    if (keys.jump && p.onGround && !jumpPressed) {
      p.vy=-6.2; p.onGround=false; jumpPressed=true;
    }
  }
  if (!keys.jump) jumpPressed=false;

  p.x += p.vx; p.onGround=false;
  for (const pl of platforms()) {
    if (!overlap({x:p.x,y:p.y,w:p.w,h:p.h},pl)) continue;
    const isLeftPlat = pl.x === 0 && pl.y === PLAT_L_Y;
    // Skip right-edge X collision with left platform when moving right —
    // player should fall into pit naturally, not get pushed left
    if (isLeftPlat && p.vx > 0) continue;
    if (p.vx>0) p.x=pl.x-p.w; else if (p.vx<0) p.x=pl.x+pl.w;
    p.vx=0;
  }
  p.y += p.vy;
  for (const pl of platforms()) {
    if (overlap({x:p.x,y:p.y,w:p.w,h:p.h},pl)) {
      if (p.vy>0) { p.y=pl.y-p.h; p.onGround=true; }
      else p.y=pl.y+pl.h;
      p.vy=0;
    }
  }
  // Enforce left wall always
  if (p.x < WALL_W) { p.x = WALL_W; p.vx = 0; }
  if (inWaterPit && !climbing && p.y < wY) { p.y = wY; p.vy = 0; }
  if (p.x<0) p.x=0;
  if (p.y>H+30) { p.dead=true; p.deathTimer=0.8; }
}

function draw() {
  const p=player, s=state, wY=s.waterLevel;
  ctx.clearRect(0,0,W,H);

  ctx.fillStyle='#d4ecd4'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#b8d8b8';
  for (let i=0;i<W;i+=40) ctx.fillRect(i,0,20,H);

  ctx.fillStyle='#7a5c2e';
  ctx.fillRect(WALL_W, PLAT_L_Y, PIT_L-WALL_W, H-PLAT_L_Y);
  ctx.fillRect(PIT_R,  PLAT_R_Y, W-WALL_W-PIT_R, H-PLAT_R_Y);
  ctx.fillStyle='#9a7a3e';
  ctx.fillRect(WALL_W, PLAT_L_Y, PIT_L-WALL_W, 7);
  ctx.fillRect(PIT_R,  PLAT_R_Y, W-WALL_W-PIT_R, 7);

  ctx.fillStyle='#444'; ctx.fillRect(PIT_L,PIT_BOT,PIT_R-PIT_L,H-PIT_BOT);
  ctx.fillStyle='#383838';
  for (let bx=PIT_L;bx<PIT_R;bx+=18) ctx.fillRect(bx,PIT_BOT,17,5);

  ctx.fillStyle='#5a3a1a';
  ctx.fillRect(0,  0, WALL_W, H);
  ctx.fillRect(W-WALL_W, 0, WALL_W, H);
  ctx.fillStyle='#3a2a0a';
  ctx.fillRect(WALL_W-2,   0, 2, H);
  ctx.fillRect(W-WALL_W,   0, 2, H);
  for (let wy=0; wy<H; wy+=20) {
    ctx.fillStyle='rgba(0,0,0,0.15)';
    ctx.fillRect(0,wy,WALL_W,10);
    ctx.fillRect(W-WALL_W,wy,WALL_W,10);
  }

  ctx.fillStyle='rgba(70,150,220,0.7)';
  ctx.fillRect(PIT_L, wY, PIT_R-PIT_L, PIT_BOT-wY);

  if (wY < PLAT_L_Y) {
    ctx.fillStyle='rgba(70,150,220,0.65)';
    ctx.fillRect(WALL_W, wY, PIT_L-WALL_W, PLAT_L_Y-wY);
  }
  if (wY < PLAT_R_Y) {
    ctx.fillStyle='rgba(70,150,220,0.65)';
    ctx.fillRect(PIT_R, wY, W-WALL_W-PIT_R, PLAT_R_Y-wY);
  }

  const surfaceY = wY;
  {
    // Pipe always visible on left wall of pit, near top
    const pipeX = PIT_L + 1;
    const pipeY = PLAT_R_Y + 20;
    // Pipe body protruding from wall
    ctx.fillStyle = '#333';
    ctx.fillRect(pipeX, pipeY - 5, 16, 10);
    ctx.fillStyle = '#555';
    ctx.fillRect(pipeX + 1, pipeY - 4, 14, 8);
    ctx.fillStyle = '#444';
    ctx.fillRect(pipeX + 12, pipeY - 5, 5, 10);
    // Pipe opening (dark hole)
    ctx.fillStyle = '#111';
    ctx.fillRect(pipeX + 14, pipeY - 3, 4, 6);

    // Animated water stream when valve active
    if (state.valveActive) {
      const streamX = pipeX + 16;
      const streamTop = pipeY;
      const streamBot = state.waterLevel;
      const t = Date.now() / 120;
      // Draw segmented animated stream
      const segments = 10;
      for (let i = 0; i < segments; i++) {
        const frac = i / segments;
        const sy = streamTop + (streamBot - streamTop) * frac;
        const sy2 = streamTop + (streamBot - streamTop) * (i+1) / segments;
        const wobble = Math.sin(t + i * 1.2) * 1.2;
        const alpha = 0.5 + 0.4 * Math.sin(t * 2 + i);
        ctx.strokeStyle = `rgba(80,170,255,${alpha})`;
        ctx.lineWidth = 3 + Math.sin(t + i) * 0.8;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(streamX + wobble, sy);
        ctx.lineTo(streamX + wobble, sy2);
        ctx.stroke();
      }
      // Splash at water surface
      const splashW = 6 + Math.sin(t * 3) * 2;
      ctx.strokeStyle = 'rgba(140,210,255,0.6)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(streamX - splashW, streamBot);
      ctx.lineTo(streamX + splashW, streamBot);
      ctx.stroke();
    }
  }

  ctx.strokeStyle='rgba(140,210,255,0.9)'; ctx.lineWidth=1.5;
  ctx.beginPath();
  const leftEdge  = wY < PLAT_L_Y ? WALL_W : PIT_L;
  const rightEdge = wY < PLAT_R_Y ? W-WALL_W : PIT_R;
  for (let wx=leftEdge; wx<=rightEdge; wx+=5) {
    if (wx > PIT_L && wx < PIT_R) {
      const wo=Math.sin(wx*0.18+Date.now()*0.003)*1.8;
      wx===leftEdge ? ctx.moveTo(wx,surfaceY+wo) : ctx.lineTo(wx,surfaceY+wo);
    } else {
      const wo=Math.sin(wx*0.2+Date.now()*0.004)*1.2;
      wx===leftEdge ? ctx.moveTo(wx,surfaceY+wo) : ctx.lineTo(wx,surfaceY+wo);
    }
  }
  ctx.stroke();

  ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(WALL_W,PLAT_L_Y); ctx.lineTo(PIT_L,PLAT_L_Y);
  ctx.lineTo(PIT_L,PIT_BOT); ctx.lineTo(PIT_R,PIT_BOT);
  ctx.lineTo(PIT_R,PLAT_R_Y); ctx.lineTo(W-WALL_W,PLAT_R_Y);
  ctx.stroke();

  ctx.strokeStyle='#7a5c2e'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(LADDER_X+2,LADDER_TOP); ctx.lineTo(LADDER_X+2,LADDER_BOT); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(LADDER_X+LADDER_W-2,LADDER_TOP); ctx.lineTo(LADDER_X+LADDER_W-2,LADDER_BOT); ctx.stroke();
  ctx.strokeStyle='#9a7a3e'; ctx.lineWidth=2;
  for (let ry=LADDER_TOP+8; ry<LADDER_BOT; ry+=12) {
    ctx.beginPath(); ctx.moveTo(LADDER_X+2,ry); ctx.lineTo(LADDER_X+LADDER_W-2,ry); ctx.stroke();
  }

  const dX = FLAG_X, dY = FLAG_Y;
  const dW = DOOR_W, dH = DOOR_H;
  ctx.fillStyle='#5a3010'; ctx.fillRect(dX,dY,dW,dH);
  ctx.fillStyle='#7a4820'; ctx.fillRect(dX+2,dY+2,dW-4,dH-4);
  ctx.fillStyle='#3a1a08'; ctx.fillRect(dX+dW/2-1,dY,2,dH);
  ctx.fillStyle='#2a0e04'; ctx.fillRect(dX,dY+dH/2-1,dW,2);
  ctx.fillStyle='#c8a060';
  ctx.beginPath(); ctx.arc(dX+dW/2,dY+dH/2,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#f0c840';
  ctx.beginPath(); ctx.arc(dX+dW/2,dY+dH/2,2.5,0,Math.PI*2); ctx.fill();
  if (!s.fishCaught) {
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.font='bold 8px monospace'; ctx.textAlign='center';
    ctx.fillText('SALIDA',dX+dW/2,dY-4);
    ctx.fillStyle='rgba(200,0,0,0.8)';
    ctx.fillText('(¡atrapa el pez!)',dX+dW/2,dY-14);
  } else {
    const pulse=0.7+0.3*Math.sin(Date.now()*0.006);
    ctx.globalAlpha=pulse;
    ctx.fillStyle='#0f0'; ctx.font='bold 8px monospace'; ctx.textAlign='center';
    ctx.fillText('SALIDA',dX+dW/2,dY-4);
    ctx.fillText('¡ABIERTA!',dX+dW/2,dY-14);
    ctx.globalAlpha=1;
    ctx.strokeStyle='#0f0'; ctx.lineWidth=1.5;
    ctx.strokeRect(dX-1,dY-1,dW+2,dH+2);
  }

  if (s.fishAlive) {
    if (s.fishY === 0) s.fishY = s.waterLevel + (PIT_BOT - s.waterLevel) * 0.55;
    const wb=Math.sin(s.fishAnim)*2;
    ctx.save(); ctx.translate(s.fishX, s.fishY);
    if (s.fishDir<0) ctx.scale(-1,1);
    ctx.fillStyle='#c00';
    ctx.beginPath(); ctx.ellipse(0,0,11,7,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#e00';
    ctx.beginPath();
    ctx.moveTo(-11,-5+wb); ctx.lineTo(-18,-10+wb); ctx.lineTo(-18,5+wb); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ffd'; ctx.beginPath(); ctx.arc(6,-2,2.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(6,-2,1,0,Math.PI*2); ctx.fill();
    ctx.restore();
    
  }

  if (s.spear) {
    const ox = p.x + p.w/2;
    const oy = p.y + p.h/2;
    const reach = s.spear.reach;
    const angle = s.spear.angle;
    const shaftLen = 14; // handle behind hand
    const tipX = ox + Math.cos(angle) * reach;
    const tipY = oy + Math.sin(angle) * reach;
    const baseX = ox - Math.cos(angle) * shaftLen;
    const baseY = oy - Math.sin(angle) * shaftLen;

    ctx.save();
    // Shaft
    ctx.strokeStyle = '#8B4513'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(baseX, baseY); ctx.lineTo(tipX, tipY); ctx.stroke();
    // Tip / blade
    ctx.translate(tipX, tipY);
    ctx.rotate(angle);
    ctx.fillStyle = '#ddd';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-7, -4);
    ctx.lineTo(10, 0);
    ctx.lineTo(-7, 4);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#999'; ctx.lineWidth = 1; ctx.stroke();
    ctx.restore();
  }

  // Hint: show attack prompt when player is near the pit edge and fish is alive
  if (s.fishAlive && !s.spear && !player.swimming && !player.climbing) {
    const pulse = 0.6+0.4*Math.sin(Date.now()*0.007);
    ctx.globalAlpha = pulse;
    ctx.fillStyle='#fc0'; ctx.font='bold 9px monospace'; ctx.textAlign='center';
    ctx.fillText('⚔ LANZA', player.x + player.w/2, player.y - 6);
    ctx.globalAlpha=1;
  }

  s.particles.forEach(sp => {
    ctx.globalAlpha=Math.max(0,sp.life);
    ctx.fillStyle='#88ccff';
    ctx.beginPath(); ctx.arc(sp.x,sp.y,2.5,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  if (!p.dead) {
    ctx.save();
    ctx.translate(p.x+p.w/2, p.y+p.h/2);
    if (p.facing===-1) ctx.scale(-1,1);
    if (p.swimming) {
      ctx.fillStyle='#1a8'; ctx.beginPath(); ctx.ellipse(0,3,9,6,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#4ef'; ctx.beginPath(); ctx.arc(0,-2,6,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#fdd'; ctx.beginPath(); ctx.arc(0,-1,4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#000';
      ctx.beginPath(); ctx.arc(-2,-2,1,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(2,-2,1,0,Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle='#1a6'; ctx.fillRect(-7,-7,14,10);
      ctx.fillStyle='#4ef'; ctx.fillRect(-5,-15,10,9);
      ctx.fillStyle='#fdd'; ctx.fillRect(-4,-6,8,6);
      ctx.fillStyle='#000';
      ctx.beginPath(); ctx.arc(-2,-10,1.5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(2,-10,1.5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#164'; ctx.fillRect(-6,3,5,7); ctx.fillRect(2,3,5,7);
      ctx.fillStyle='#0a3'; ctx.fillRect(-6,9,4,3); ctx.fillRect(3,9,4,3);
    }
    ctx.restore();
  }

  if (s.fishAlive) {
    ctx.fillStyle='rgba(180,0,0,0.75)'; ctx.font='bold 9px monospace'; ctx.textAlign='center';
    const fy=wY+(PIT_BOT-wY)*0.55;
  }

  const METER_TOTAL = PIT_BOT - PLAT_L_Y; // 100px = full range
  const pct = Math.min(100, Math.max(0, Math.round((PIT_BOT - wY) / METER_TOTAL * 100)));
  const meterW = 10;
  const meterX = PIT_L - 18;
  const meterY = PLAT_L_Y;
  const meterH = METER_TOTAL;
  ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(meterX-1,meterY-1,meterW+2,meterH+2);
  const fillH = Math.round(meterH*pct/100);
  const col = pct<40?'#44aaff':pct<75?'#22cc66':pct<90?'#ffaa00':'#ff4444';
  ctx.fillStyle=col; ctx.fillRect(meterX,meterY+meterH-fillH,meterW,fillH);
  ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=0.5;
  ctx.strokeRect(meterX,meterY,meterW,meterH);
  ctx.fillStyle='#fff'; ctx.font='bold 11px monospace'; ctx.textAlign='right';
  ctx.fillText(pct+'%', meterX-3, meterY+meterH-fillH+4);

  if (!s.valveUsed) {
    const pulse=0.6+0.4*Math.sin(Date.now()*0.004);
    ctx.globalAlpha=pulse;
    ctx.fillStyle='#fc0'; ctx.font='bold 10px monospace'; ctx.textAlign='center';
    ctx.fillText('↓ configura la válvula abajo', W/2, H-8);
    ctx.globalAlpha=1;
  }
}

let last=0;
function loop(ts) {
  const dt=Math.min((ts-last)/1000,0.05); last=ts;
  if (player && state) { update(dt); draw(); }
  requestAnimationFrame(loop);
}

function showOverlay(title,msg,btn,reset) {
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<h2>${title}</h2><p>${msg.replace(/\n/g,'<br>')}</p><button id="startBtn">${btn}</button>`;
  ov.style.display='flex';
  document.getElementById('startBtn').onclick=()=>{
    if (reset) { lives=3; updateUI(); }
    initGame(); ov.style.display='none'; gameRunning=true;
  };
}

document.getElementById('valveSlider').oninput=function(){
  document.getElementById('valveTimeLabel').textContent=this.value+'s';
};
document.getElementById('valveBtn').onclick=function(){
  if (state.valveUsed||!gameRunning) return;
  const t=parseInt(document.getElementById('valveSlider').value);
  state.valveUsed=true; state.valveActive=true; state.valveTimer=t;
  this.disabled=true;
  document.getElementById('valveSlider').disabled=true;
  setStatus('Válvula abierta por '+t+'s...');
};

function bindBtn(id,key) {
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{e.preventDefault();keys[key]=true;},{passive:false});
  el.addEventListener('touchend',  e=>{e.preventDefault();keys[key]=false;jumpPressed=false;},{passive:false});
  el.addEventListener('mousedown', ()=>keys[key]=true);
  el.addEventListener('mouseup',   ()=>{keys[key]=false;jumpPressed=false;});
}
bindBtn('leftBtn','left'); bindBtn('rightBtn','right'); bindBtn('jumpBtn','jump');
bindBtn('attackBtn','attack');

document.addEventListener('keydown',e=>{
  if (e.key==='ArrowLeft' ||e.key==='a') keys.left=true;
  if (e.key==='ArrowRight'||e.key==='d') keys.right=true;
  if ((e.key===' '||e.key==='ArrowUp'||e.key==='w')&&!jumpPressed){keys.jump=true;}
  if (e.key==='z'||e.key==='x'||e.key==='ArrowDown') keys.attack=true;
});
document.addEventListener('keyup',e=>{
  if (e.key==='ArrowLeft' ||e.key==='a') keys.left=false;
  if (e.key==='ArrowRight'||e.key==='d') keys.right=false;
  if (e.key===' '||e.key==='ArrowUp'||e.key==='w') keys.jump=false;
  if (e.key==='z'||e.key==='x'||e.key==='ArrowDown') keys.attack=false;
});

document.getElementById('startBtn').onclick=()=>{
  initGame(); document.getElementById('overlay').style.display='none'; gameRunning=true;
};

initGame();
requestAnimationFrame(loop);
updateUI();
</script>
